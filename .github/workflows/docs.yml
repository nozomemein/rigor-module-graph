name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# A single Pages deployment runs at a time; queue subsequent runs
# so two quick merges don't race on the same site.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Generate RDoc
        # `rake rdoc` writes the darkfish HTML tree to ./doc per
        # the RDoc::Task in the Rakefile.
        run: bundle exec rake rdoc

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artefact
        # v5.0.0+ pins its transitive actions/upload-artifact to a
        # SHA — older v3 left it on @v4, which the new owner's
        # "all actions must be pinned" repo policy rejects.
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # `actions/deploy-pages` requires the `pages: write` and
    # `id-token: write` permissions and a `github-pages`
    # environment binding to publish.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
